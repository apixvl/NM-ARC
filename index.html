<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NM_ARCHIVE // V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --accent: #ff3c00;
            --text: #f0f0f0;
            --text-dim: #777;
            --font-main: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --border: 1px solid #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); overflow-x: hidden; }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            background: rgba(10,10,10,0.96); backdrop-filter: blur(12px);
            border-bottom: var(--border); padding: 0.85rem 1.5rem;
            display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 1.2rem;
        }
        .nav-menu-btn {
            cursor: pointer; font-family: var(--font-mono); font-size: 0.9rem;
            color: var(--text-dim); border: var(--border); padding: 6px 10px; border-radius: 4px;
            transition: 0.15s; user-select: none;
        }
        .nav-menu-btn:hover { color: var(--accent); border-color: var(--accent); }
        .brand { font-weight: 700; cursor: pointer; font-size: 1.1rem; white-space: nowrap; }
        .brand span { color: var(--accent); }
        .search-container { position: relative; }
        #search-bar {
            width: 100%; background: #1a1a1a; border: var(--border);
            padding: 0.55rem 1rem; color: #fff; font-family: var(--font-mono);
            font-size: 0.78rem; border-radius: 4px; outline: none;
        }
        #search-bar:focus { border-color: var(--accent); }
        #search-bar::placeholder { color: #555; }
        .nav-status { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; }
        .nav-status.syncing { color: var(--accent); }

        /* ── SIDEBAR (replaces horizontal tab scroll) ── */
        #sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1500;
            display: none; backdrop-filter: blur(2px);
        }
        #sidebar-overlay.open { display: block; }
        #sidebar {
            position: fixed; top: 0; left: -340px; width: 320px; height: 100%; z-index: 1600;
            background: #0d0d0d; border-right: 1px solid #222;
            transition: left 0.25s ease; display: flex; flex-direction: column;
        }
        #sidebar.open { left: 0; }
        .sidebar-hdr {
            padding: 1.2rem 1.2rem 0.8rem; border-bottom: var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-hdr-title { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 2px; }
        .sidebar-close { cursor: pointer; color: #555; font-family: var(--font-mono); font-size: 0.8rem; }
        .sidebar-close:hover { color: var(--text); }
        .sidebar-search {
            padding: 0.8rem 1.2rem;
        }
        .sidebar-search input {
            width: 100%; background: #1a1a1a; border: var(--border); border-radius: 4px;
            padding: 0.5rem 0.8rem; color: #fff; font-family: var(--font-mono); font-size: 0.72rem; outline: none;
        }
        .sidebar-search input:focus { border-color: var(--accent); }
        .sidebar-list { flex: 1; overflow-y: auto; padding: 0 0 1.5rem; }
        .sidebar-group-hdr {
            font-family: var(--font-mono); font-size: 0.62rem; color: #555;
            text-transform: uppercase; letter-spacing: 1.5px;
            padding: 1rem 1.2rem 0.4rem;
        }
        .sidebar-item {
            padding: 0.5rem 1.2rem; cursor: pointer; font-size: 0.8rem;
            color: var(--text-dim); transition: 0.12s; border-left: 2px solid transparent;
            display: flex; justify-content: space-between; align-items: center; gap: 8px;
        }
        .sidebar-item:hover { background: #161616; color: var(--text); }
        .sidebar-item.active { color: var(--accent); border-left-color: var(--accent); background: #1a0d08; }
        .sidebar-item-badge { font-family: var(--font-mono); font-size: 0.55rem; color: #444; flex-shrink: 0; }

        /* ── MAIN ── */
        main { padding: 2rem; max-width: 1600px; margin: 0 auto; min-height: 100vh; margin-top: 64px; }

        /* ── HOME ── */
        .home-hero { padding: 3rem 0 2rem; border-bottom: var(--border); margin-bottom: 2.5rem; }
        .home-hero h1 { font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 700; letter-spacing: -4px; line-height: 0.9; color: var(--text); }
        .home-hero h1 span { color: var(--accent); }
        .home-hero p { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim); margin-top: 1.2rem; max-width: 480px; line-height: 1.9; }
        .home-stats { display: flex; gap: 2.5rem; margin-top: 1.8rem; }
        .stat-num { font-size: 2.2rem; font-weight: 700; color: var(--accent); line-height: 1; }
        .stat-label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-top: 2px; }

        .home-section { margin-bottom: 2.5rem; }
        .home-section-hdr {
            font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 1px solid #1e1e1e; padding-bottom: 0.5rem; margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: 1rem; justify-content: space-between;
        }
        .home-section-count { color: #444; font-size: 0.6rem; }
        .home-section-toggle {
            font-family: var(--font-mono); font-size: 0.6rem; color: #444; cursor: pointer;
        }
        .home-section-toggle:hover { color: var(--accent); }
        .home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.7rem; }
        .home-card {
            background: var(--panel); border: var(--border); cursor: pointer;
            transition: 0.2s; overflow: hidden; position: relative;
        }
        .home-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .home-card-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; border-bottom: var(--border); background: #0e0e0e; }
        .home-card-img-placeholder {
            width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            background: #0e0e0e; border-bottom: var(--border);
            font-family: var(--font-mono); font-size: 0.55rem; color: #2a2a2a; letter-spacing: 2px; text-align: center; padding: 0.5rem;
        }
        .home-card-info { padding: 0.55rem 0.6rem; }
        .home-card-type { font-family: var(--font-mono); font-size: 0.55rem; color: #555; }
        .home-card-name { font-weight: 500; font-size: 0.78rem; margin-top: 2px; line-height: 1.3; }
        .home-card-loading-spin {
            position: absolute; top: 6px; right: 6px; width: 10px; height: 10px;
            border: 2px solid #333; border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.7s linear infinite; display: none;
        }
        .home-card.is-loading .home-card-loading-spin { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── SHEET VIEW ── */
        #sheet-view { display: none; }
        .sheet-hdr { margin: 0.5rem 0 0.5rem; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            cursor: pointer; color: var(--accent); font-family: var(--font-mono);
            font-size: 0.68rem; margin-bottom: 1.2rem; opacity: 0.8; transition: 0.15s;
        }
        .back-btn:hover { opacity: 1; }
        .sheet-meta { font-family: var(--font-mono); font-size: 0.7rem; color: #555; margin-bottom: 4px; }
        .sheet-title { font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: -2px; line-height: 1; font-weight: 700; }
        .sheet-desc {
            font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim);
            background: #0e0e0e; border: var(--border); border-left: 2px solid var(--accent);
            padding: 0.7rem 1rem; margin: 1.2rem 0 0; line-height: 1.8; max-width: 700px;
        }

        /* ── SEC HDR ── */
        .sec-hdr {
            font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 1px solid #1e1e1e; padding-bottom: 0.4rem;
            margin: 2rem 0 1rem; display: flex; align-items: center; gap: 1rem;
        }
        .sec-hdr-count { color: #444; font-size: 0.6rem; }

        /* ── GALLERY ── */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.8rem; }
        .img-wrap {
            background: #0e0e0e; border: var(--border); position: relative;
            cursor: zoom-in; overflow: hidden;
        }
        .img-wrap img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; transition: 0.25s; }
        .img-wrap:hover img { opacity: 0.55; transform: scale(1.03); }
        .img-meta {
            position: absolute; bottom: 0; left: 0; padding: 8px 10px;
            font-size: 0.65rem; font-family: var(--font-mono);
            background: rgba(0,0,0,0.88); width: 100%;
            transform: translateY(100%); transition: 0.2s; line-height: 1.5;
        }
        .img-wrap:hover .img-meta { transform: translateY(0); }

        /* ── LIGHTBOX ── */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.97);
            display: none; z-index: 3000; padding: 40px; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #lightbox.open { display: flex; }
        #lightbox img { max-width: 90%; max-height: 80vh; border: 1px solid #2a2a2a; }
        .lb-close { position: absolute; top: 28px; right: 36px; cursor: pointer; font-family: var(--font-mono); color: var(--accent); font-size: 0.75rem; }
        #lb-cap { margin-top: 18px; font-family: var(--font-mono); font-size: 0.65rem; color: #555; text-align: center; max-width: 600px; line-height: 1.6; }

        /* ── LOADING (per-sheet) ── */
        .sheet-loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 40vh; gap: 1rem;
        }
        .loading-bar { width: 160px; height: 1px; background: #222; overflow: hidden; }
        .loading-bar-inner { height: 100%; background: var(--accent); width: 30%; animation: lb 1.1s ease-in-out infinite; }
        @keyframes lb { 0% { transform: translateX(-100%); } 100% { transform: translateX(700%); } }
        .loading-label { font-family: var(--font-mono); font-size: 0.65rem; color: #444; }
        .error-label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--accent); }
        .empty-state { font-family: var(--font-mono); font-size: 0.7rem; color: #333; padding: 3rem 0; text-align: center; }

        /* ── NETWORK LOG (the "fun visual" — looks like devtools network tab) ── */
        #netlog-panel {
            position: fixed; bottom: 14px; right: 14px; width: 340px; max-height: 240px;
            background: #0c0c0c; border: 1px solid #262626; border-radius: 6px;
            font-family: var(--font-mono); font-size: 0.62rem; z-index: 2500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6); overflow: hidden;
            display: none; flex-direction: column;
        }
        #netlog-panel.visible { display: flex; }
        .netlog-hdr {
            padding: 6px 10px; border-bottom: 1px solid #1e1e1e; color: #555;
            display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px;
            background: #111;
        }
        .netlog-hdr-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .netlog-body { flex: 1; overflow-y: auto; padding: 4px 0; }
        .netlog-row {
            padding: 3px 10px; display: flex; justify-content: space-between; gap: 8px;
            color: #666; border-bottom: 1px solid #161616; white-space: nowrap; overflow: hidden;
        }
        .netlog-row.ok { color: #6ec46e; }
        .netlog-row.pending { color: var(--accent); }
        .netlog-row.err { color: #e85a5a; }
        .netlog-row-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .netlog-row-status { flex-shrink: 0; }

        /* ── RESPONSIVE ── */
        @media (max-width: 800px) {
            nav { grid-template-columns: auto 1fr auto; }
            .nav-status { display: none; }
            .home-grid { grid-template-columns: repeat(3, 1fr); }
            .home-hero h1 { letter-spacing: -2px; }
            #sidebar { width: 86vw; left: -90vw; }
            #netlog-panel { width: calc(100vw - 28px); right: 14px; left: 14px; }
        }
        @media (max-width: 500px) {
            .home-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>

    <div class="nav-status" id="nav-status">READY</div>
</nav>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="sidebar">

        <div class="sidebar-hdr-title">ALL TABS</div>

    </div>
    <div class="sidebar-search">

</div>

<main>

    <div id="sheet-view"></div>
    <div id="search-results-view" style="display:none;"></div>
</main>

<div id="lightbox" onclick="handleLBClick(event)">

    <div id="lb-cap"></div>
</div>

<div id="netlog-panel">

</div>

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let ACTIVE_TAB    = null;   // displayName of active tab, or null = home
let QUERY         = '';     // global search query
const SHEET_CACHE = {};     // displayName -> { status: 'idle'|'loading'|'loaded'|'error', parsedData, error }
const ROW_CACHE   = {};     // sheetTab -> raw rows (so duplicate sheetTab refs share one fetch)

// ═══════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════
function safeUrl(v) {
    return (typeof v === 'string' && v.startsWith('http')) ? v : null;
}
const SKIP_PHRASES = [
    'sheet features', 'press here', 'return to overview',
    'click here', 'image / track', 'image / playlist',
];
function shouldSkip(title) {
    if (!title) return true;
    const t = title.toLowerCase().trim();
    return SKIP_PHRASES.some(p => t.startsWith(p));
}
function esc(s) {
    return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function ea(s) {
    return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
function getDef(displayName) {
    return SHEET_TABS.find(d => d.displayName === displayName);
}

// ═══════════════════════════════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════════════════════════════
function parseSheet(descriptor, rows) {
    const { nameCol, urlCol } = descriptor;
    let desc = '';
    const items = [];

    rows.forEach(row => {
        const title = (row[nameCol] ?? Object.values(row)[0] ?? '').toString().trim();
        let url = safeUrl(row[urlCol]);
        if (!url) {
            for (const v of Object.values(row)) {
                if (safeUrl(v)) { url = v; break; }
            }
        }
        if (!title && !url) return;
        if (title.toLowerCase().includes('sheet features') || title.toLowerCase().includes('this sheet')) {
            desc = title; return;
        }
        if (shouldSkip(title)) return;
        if (url) items.push({ title, url });
    });

    return { desc, items };
}

// ═══════════════════════════════════════════════════════════════════
// NETWORK LOG (the fun devtools-style visual)
// ═══════════════════════════════════════════════════════════════════
let netlogHideTimer = null;
function showNetlog() {
    document.getElementById('netlog-panel').classList.add('visible');
    if (netlogHideTimer) { clearTimeout(netlogHideTimer); netlogHideTimer = null; }
}
function hideNetlog() {
    document.getElementById('netlog-panel').classList.remove('visible');
}
function scheduleNetlogAutoHide(delay = 2200) {
    if (netlogHideTimer) clearTimeout(netlogHideTimer);
    netlogHideTimer = setTimeout(hideNetlog, delay);
}
function netlogRow(id, label) {
    const body = document.getElementById('netlog-body');
    const row = document.createElement('div');
    row.className = 'netlog-row pending';
    row.id = `netlog-${id}`;
    row.innerHTML = `<span class="netlog-row-name">${esc(label)}</span><span class="netlog-row-status">···</span>`;
    body.appendChild(row);
    body.scrollTop = body.scrollHeight;
    // cap visible rows
    while (body.children.length > 40) body.removeChild(body.firstChild);
    return row;
}
function netlogResolve(id, ok, statusText) {
    const row = document.getElementById(`netlog-${id}`);
    if (!row) return;
    row.className = `netlog-row ${ok ? 'ok' : 'err'}`;
    row.querySelector('.netlog-row-status').textContent = statusText;
}

// ═══════════════════════════════════════════════════════════════════
// LAZY FETCH — only called when a tab is actually opened/needed
// ═══════════════════════════════════════════════════════════════════
async function loadSheet(displayName) {
    if (SHEET_CACHE[displayName] && SHEET_CACHE[displayName].status === 'loaded') {
        return SHEET_CACHE[displayName];
    }
    const def = getDef(displayName);
    if (!def) return null;

    SHEET_CACHE[displayName] = { status: 'loading' };

    showNetlog();
    const logId = `${def.sheetTab}-${Date.now()}`;
    const row = netlogRow(logId, `GET /${def.sheetTab}`);

    try {
        let rows;
        if (ROW_CACHE[def.sheetTab]) {
            rows = ROW_CACHE[def.sheetTab];
            netlogResolve(logId, true, 'CACHE');
        } else {
            const res = await fetch(`${OPENSHEET}/${encodeURIComponent(def.sheetTab)}`);
            if (!res.ok) {
                netlogResolve(logId, false, `${res.status}`);
                SHEET_CACHE[displayName] = { status: 'error', error: `HTTP ${res.status}` };
                scheduleNetlogAutoHide();
                return SHEET_CACHE[displayName];
            }
            rows = await res.json();
            rows = Array.isArray(rows) ? rows : [];
            ROW_CACHE[def.sheetTab] = rows;
            netlogResolve(logId, true, `200 (${rows.length})`);
        }

        const parsedData = parseSheet(def, rows);
        SHEET_CACHE[displayName] = { status: 'loaded', parsedData };
        scheduleNetlogAutoHide();
        return SHEET_CACHE[displayName];
    } catch (e) {
        netlogResolve(logId, false, 'ERR');
        SHEET_CACHE[displayName] = { status: 'error', error: e.message };
        scheduleNetlogAutoHide();
        return SHEET_CACHE[displayName];
    }
}

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('sidebar-overlay');
    const opening = !sb.classList.contains('open');
    sb.classList.toggle('open', opening);
    ov.classList.toggle('open', opening);
    if (opening) renderSidebar();
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
}
function renderSidebar() {
    const filterVal = (document.getElementById('sidebar-search-input').value || '').trim().toLowerCase();
    const list = document.getElementById('sidebar-list');

    const groups = {};
    SHEET_TABS.forEach(def => {
        if (filterVal && !def.displayName.toLowerCase().includes(filterVal)) return;
        if (!groups[def.group]) groups[def.group] = [];
        groups[def.group].push(def);
    });

    let html = '';
    for (const [groupName, defs] of Object.entries(groups)) {
        html += `<div class="sidebar-group-hdr">${esc(groupName)} (${defs.length})</div>`;
        defs.forEach(def => {
            html += `<div class="sidebar-item ${ACTIVE_TAB === def.displayName ? 'active' : ''}"
                          onclick="showSheet('${ea(def.displayName)}'); closeSidebar();">
                <span>${esc(def.displayName)}</span>
                <span class="sidebar-item-badge">${esc(def.badge)}</span>
            </div>`;
        });
    }
    if (!html) html = `<div style="padding:1rem 1.2rem;color:#444;font-family:var(--font-mono);font-size:0.7rem;">NO_MATCHES</div>`;
    list.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER: HOME  (instant — no fetching, just descriptor metadata)
// ═══════════════════════════════════════════════════════════════════
function renderHome() {
    const view = document.getElementById('home-view');
    view.style.display = 'block';

    const groups = {};
    SHEET_TABS.forEach(def => {
        if (!groups[def.group]) groups[def.group] = [];
        groups[def.group].push(def);
    });

    let sectionsHtml = '';
    for (const [groupName, defs] of Object.entries(groups)) {
        const cards = defs.map(def => {
            const cacheEntry = SHEET_CACHE[def.displayName];
            const count = cacheEntry && cacheEntry.status === 'loaded'
                ? cacheEntry.parsedData.items.length
                : null;
            const thumb = cacheEntry && cacheEntry.status === 'loaded'
                ? cacheEntry.parsedData.items.find(i => i.url)?.url
                : null;

            const imgHtml = thumb
                ? `<img class="home-card-img" src="${esc(thumb)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : '';
            const placeholderHtml = `<div class="home-card-img-placeholder" style="${thumb ? 'display:none' : ''}">${esc(def.badge)}</div>`;

            return `<div class="home-card" data-tab="${esc(def.displayName)}" onclick="showSheet('${ea(def.displayName)}')">
                <div class="home-card-loading-spin"></div>
                ${imgHtml}${placeholderHtml}
                <div class="home-card-info">
                    <div class="home-card-type">${count !== null ? count + ' IMAGES' : esc(def.badge)}</div>
                    <div class="home-card-name">${esc(def.displayName)}</div>
                </div>
            </div>`;
        }).join('');

        sectionsHtml += `<div class="home-section">
            <div class="home-section-hdr">${esc(groupName)} <span class="home-section-count">(${defs.length})</span></div>
            <div class="home-grid">${cards}</div>
        </div>`;
    }

    view.innerHTML = `
        <div class="home-hero">
            <h1>NM<span>/</span>ARCHIVE</h1>
            <p>A live-synced archive of image assets from the Nintendo Music app. Tabs load on demand — open one, or search across all of them up top.</p>
            <div class="home-stats">
                <div><div class="stat-num">${SHEET_TABS.length}</div><div class="stat-label">Tabs</div></div>
                <div><div class="stat-num" id="home-loaded-stat">${Object.values(SHEET_CACHE).filter(s=>s.status==='loaded').length}</div><div class="stat-label">Loaded</div></div>
            </div>
        </div>
        ${sectionsHtml}
    `;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER: SHEET (lazy — fetches on first open, shows loading state)
// ═══════════════════════════════════════════════════════════════════
async function showSheet(displayName) {
    ACTIVE_TAB = displayName;
    QUERY = '';
    document.getElementById('search-bar').value = '';

    document.getElementById('home-view').style.display = 'none';
    document.getElementById('search-results-view').style.display = 'none';
    const sv = document.getElementById('sheet-view');
    sv.style.display = 'block';

    const def = getDef(displayName);
    if (!def) { sv.innerHTML = `<div class="empty-state">TAB_NOT_FOUND</div>`; return; }

    // show loading skeleton immediately
    sv.innerHTML = `
        <div class="back-btn" onclick="goHome()">← BACK_TO_INDEX</div>
        <div class="sheet-title">${esc(def.displayName)}</div>
        <div class="sheet-loading">
            <div class="loading-bar"><div class="loading-bar-inner"></div></div>
            <div class="loading-label">LOADING "${esc(def.sheetTab)}"...</div>
        </div>
    `;
    window.scrollTo(0, 0);

    const result = await loadSheet(displayName);

    // user may have navigated away while this was loading
    if (ACTIVE_TAB !== displayName) return;

    if (!result || result.status === 'error') {
        sv.innerHTML = `
            <div class="back-btn" onclick="goHome()">← BACK_TO_INDEX</div>
            <div class="sheet-title">${esc(def.displayName)}</div>
            <div class="sheet-loading"><div class="error-label">FAILED_TO_LOAD: ${esc(result?.error || 'unknown error')}</div></div>
        `;
        return;
    }

    const { items, desc } = result.parsedData;

    sv.innerHTML = `
        <div class="sheet-hdr">
            <div class="back-btn" onclick="goHome()">← BACK_TO_INDEX</div>
            <div class="sheet-meta">${esc(def.badge)} // ${items.length} IMAGES</div>
            <div class="sheet-title">${esc(def.displayName)}</div>
            ${desc ? `<div class="sheet-desc">${esc(desc)}</div>` : ''}
        </div>
        <div id="sheet-content"></div>
    `;
    renderSheetContent(def, result.parsedData);
}

function renderSheetContent(def, parsedData) {
    const cont = document.getElementById('sheet-content');
    if (!cont) return;

    const items = parsedData.items.filter(i =>
        !QUERY || i.title.toLowerCase().includes(QUERY)
    );

    if (!items.length) { cont.innerHTML = `<div class="empty-state">NO_RESULTS</div>`; return; }

    const banners = items.filter(i => i.title.toLowerCase().includes('banner'));
    const rest    = items.filter(i => !i.title.toLowerCase().includes('banner'));

    let html = '';
    if (banners.length) {
        html += `<div class="sec-hdr">BANNER <span class="sec-hdr-count">(${banners.length})</span></div><div class="gallery">`;
        banners.forEach(i => { html += imgWrap(i.url, i.title); });
        html += `</div>`;
    }
    if (rest.length) {
        html += `<div class="sec-hdr">IMAGES <span class="sec-hdr-count">(${rest.length})</span></div><div class="gallery">`;
        rest.forEach(i => { html += imgWrap(i.url, i.title); });
        html += `</div>`;
    }
    cont.innerHTML = html;
}

function imgWrap(url, title) {
    return `<div class="img-wrap" onclick="openLB('${ea(url)}','${ea(title)}')">
        <img src="${esc(url)}" loading="lazy" alt="${esc(title)}">
        <div class="img-meta">${esc(title)}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// GLOBAL SEARCH
// ─────────────────────────────────────────────────────────────────
// Works site-wide regardless of which tab (if any) is open. Typing a
// query triggers background loading of every not-yet-loaded sheet so
// results can include tabs you haven't visited yet. Already-loaded
// sheets are searched instantly; others stream in as they finish.
// ═══════════════════════════════════════════════════════════════════
let searchDebounce = null;
let searchGeneration = 0;

function handleGlobalSearchInput() {
    const val = document.getElementById('search-bar').value.trim();
    if (searchDebounce) clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => runGlobalSearch(val), 220);
}

async function runGlobalSearch(rawQuery) {
    const q = rawQuery.trim().toLowerCase();
    const myGen = ++searchGeneration;

    if (!q) {
        // restore whatever view we were on
        document.getElementById('search-results-view').style.display = 'none';
        if (ACTIVE_TAB) { document.getElementById('sheet-view').style.display = 'block'; }
        else { document.getElementById('home-view').style.display = 'block'; renderHome(); }
        return;
    }

    QUERY = q; // also used by in-sheet rendering if relevant
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('sheet-view').style.display = 'none';
    const resView = document.getElementById('search-results-view');
    resView.style.display = 'block';

    renderSearchResults(q, myGen, false);

    // Kick off background loading of any sheet not yet cached, so results
    // become more complete as they stream in. Loaded sheets are free.
    const toLoad = SHEET_TABS.filter(def => !SHEET_CACHE[def.displayName] || SHEET_CACHE[def.displayName].status !== 'loaded');

    // Limit concurrency a bit so we don't blast 150 requests at once
    const CONCURRENCY = 6;
    let idx = 0;
    async function worker() {
        while (idx < toLoad.length) {
            const def = toLoad[idx++];
            if (myGen !== searchGeneration) return; // query changed, abandon
            await loadSheet(def.displayName);
            if (myGen === searchGeneration) renderSearchResults(q, myGen, true);
        }
    }
    const workers = [];
    for (let w = 0; w < CONCURRENCY; w++) workers.push(worker());
    await Promise.all(workers);
}

function renderSearchResults(q, gen, isStreaming) {
    if (gen !== searchGeneration) return;
    const resView = document.getElementById('search-results-view');

    const matches = []; // { tabDisplayName, badge, title, url }
    let scannedTabs = 0, totalTabs = SHEET_TABS.length;

    SHEET_TABS.forEach(def => {
        const cache = SHEET_CACHE[def.displayName];
        if (!cache || cache.status !== 'loaded') return;
        scannedTabs++;
        cache.parsedData.items.forEach(item => {
            if (item.title.toLowerCase().includes(q)) {
                matches.push({ tab: def.displayName, badge: def.badge, title: item.title, url: item.url });
            }
        });
    });

    const statusLine = isStreaming
        ? `SEARCHING... (${scannedTabs}/${totalTabs} TABS SCANNED) — ${matches.length} MATCHES SO FAR`
        : `${matches.length} MATCHES ACROSS ${scannedTabs}/${totalTabs} TABS`;

    const cardsHtml = matches.map(m => `
        <div class="img-wrap" onclick="openLB('${ea(m.url)}','${ea(m.title)}')">
            <img src="${esc(m.url)}" loading="lazy" alt="${esc(m.title)}">
            <div class="img-meta">${esc(m.title)}<br><span style="color:#777;cursor:pointer;" onclick="event.stopPropagation(); jumpToTabFromSearch('${ea(m.tab)}')">→ ${esc(m.tab)}</span></div>
        </div>
    `).join('');

    resView.innerHTML = `
        <div class="sheet-hdr">
            <div class="sheet-title" style="font-size: clamp(1.6rem, 4vw, 2.6rem);">"${esc(q)}"</div>
            <div class="sheet-meta" style="margin-top:6px;">${statusLine}</div>
        </div>
        ${matches.length
            ? `<div class="gallery" style="margin-top:1.5rem;">${cardsHtml}</div>`
            : `<div class="empty-state">${isStreaming ? 'SEARCHING...' : 'NO_MATCHES_FOUND'}</div>`}
    `;
}

function jumpToTabFromSearch(displayName) {
    document.getElementById('search-bar').value = '';
    document.getElementById('search-results-view').style.display = 'none';
    showSheet(displayName);
}

// ═══════════════════════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════════════════════
function openLB(url, title) {
    document.getElementById('lb-img').src = url;
    document.getElementById('lb-cap').textContent = title;
    document.getElementById('lightbox').classList.add('open');
}
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }
function handleLBClick(e) { if (e.target === document.getElementById('lightbox')) closeLB(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

// ═══════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════
function goHome() {
    ACTIVE_TAB = null;
    QUERY = '';
    document.getElementById('search-bar').value = '';
    document.getElementById('sheet-view').style.display = 'none';
    document.getElementById('search-results-view').style.display = 'none';
    document.getElementById('home-view').style.display = 'block';
    renderHome();
    window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════════
// INIT  (instant — no network calls on page load)
// ═══════════════════════════════════════════════════════════════════
function init() {
    document.getElementById('nav-status').textContent = `${SHEET_TABS.length} TABS READY`;
    renderHome();
}

init();
</script>
